<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .title { font: 700 34px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #1f2937; }
      .section { font: 700 22px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 18px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #334155; }
      .small { font: 500 16px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2.5; rx: 14; }
      .box-green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.5; rx: 14; }
      .box-orange { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; rx: 14; }
      .box-purple { fill: #faf5ff; stroke: #9333ea; stroke-width: 2.5; rx: 14; }
      .box-gray { fill: #f8fafc; stroke: #64748b; stroke-width: 2.5; rx: 14; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrowhead); }
      .note { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; rx: 12; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#475569" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="980" fill="#f8fafc"/>
  <text x="700" y="58" text-anchor="middle" class="title">第三章研究方法流程圖</text>
  <text x="700" y="91" text-anchor="middle" class="small">農產品價格預測：資料處理、特徵建構、模型訓練與模型評估流程</text>

  <!-- Data sources -->
  <rect x="80" y="140" width="260" height="145" class="box"/>
  <text x="210" y="174" text-anchor="middle" class="section">資料來源</text>
  <text x="110" y="213" class="text">農產品交易資料</text>
  <text x="110" y="243" class="small">價格、交易量、市場資訊</text>
  <text x="110" y="273" class="small">高麗菜、小白菜、花椰菜、青蔥、萵苣</text>

  <rect x="80" y="330" width="260" height="125" class="box"/>
  <text x="210" y="364" text-anchor="middle" class="section">輔助資料</text>
  <text x="110" y="404" class="text">氣象資料</text>
  <text x="110" y="434" class="small">溫度、降雨、濕度、豪雨指標</text>

  <!-- Preprocessing -->
  <rect x="430" y="180" width="300" height="235" class="box-green"/>
  <text x="580" y="216" text-anchor="middle" class="section">資料前處理</text>
  <text x="465" y="258" class="text">1. 日期格式整理與排序</text>
  <text x="465" y="293" class="text">2. 缺漏值與異常值處理</text>
  <text x="465" y="328" class="text">3. 整合每日作物層級資料</text>
  <text x="465" y="363" class="text">4. 依時間切分訓練與測試資料</text>
  <text x="465" y="393" class="small">避免未來資訊洩漏</text>

  <!-- Feature engineering -->
  <rect x="820" y="140" width="330" height="315" class="box-orange"/>
  <text x="985" y="176" text-anchor="middle" class="section">特徵建構</text>
  <text x="855" y="218" class="text">價格特徵</text>
  <text x="875" y="248" class="small">落後期價格、移動平均、移動標準差</text>
  <text x="855" y="288" class="text">交易特徵</text>
  <text x="875" y="318" class="small">交易量、交易筆數、品項數、市場數</text>
  <text x="855" y="358" class="text">時間特徵</text>
  <text x="875" y="388" class="small">年份、月份、星期、月份週期轉換</text>
  <text x="855" y="428" class="text">氣象特徵</text>
  <text x="875" y="458" class="small">溫度、降雨、濕度與豪雨相關變數</text>

  <!-- Targets -->
  <rect x="430" y="535" width="300" height="190" class="box-purple"/>
  <text x="580" y="571" text-anchor="middle" class="section">預測任務設計</text>
  <text x="465" y="615" class="text">應變數：未來價格</text>
  <text x="465" y="652" class="small">target_h1：預測 1 日後價格</text>
  <text x="465" y="682" class="small">target_h5：預測 5 日後價格</text>
  <text x="465" y="712" class="small">target_h7 / target_h14：較長天期預測</text>

  <!-- Models -->
  <rect x="820" y="535" width="330" height="265" class="box"/>
  <text x="985" y="571" text-anchor="middle" class="section">模型訓練</text>
  <text x="855" y="615" class="text">機器學習回歸模型</text>
  <text x="875" y="645" class="small">Ridge、Random Forest</text>
  <text x="875" y="675" class="small">XGBoost、LightGBM</text>
  <text x="855" y="720" class="text">時間序列模型</text>
  <text x="875" y="750" class="small">SARIMA、Prophet</text>
  <text x="855" y="780" class="small">與 naive / moving average 基準模型比較</text>

  <!-- Evaluation -->
  <rect x="80" y="610" width="260" height="190" class="box-gray"/>
  <text x="210" y="646" text-anchor="middle" class="section">模型評估</text>
  <text x="115" y="690" class="text">MAE：平均絕對誤差</text>
  <text x="115" y="722" class="text">RMSE：均方根誤差</text>
  <text x="115" y="754" class="text">MAPE：百分比誤差</text>
  <text x="115" y="786" class="text">R²：解釋能力</text>

  <!-- Output -->
  <rect x="1190" y="535" width="150" height="265" class="note"/>
  <text x="1265" y="570" text-anchor="middle" class="section">結果應用</text>
  <text x="1210" y="615" class="small">模型比較</text>
  <text x="1210" y="650" class="small">短期價格趨勢</text>
  <text x="1210" y="685" class="small">價格風險參考</text>
  <text x="1210" y="720" class="small">輔助決策</text>

  <!-- Conclusion note -->
  <rect x="225" y="865" width="950" height="70" class="note"/>
  <text x="700" y="896" text-anchor="middle" class="text">研究重點：以歷史交易資料、時間特徵與氣象資料建立價格預測模型</text>
  <text x="700" y="924" text-anchor="middle" class="small">比較不同模型於 1、5、7、14 日預測天期下之表現，作為短期價格趨勢與決策輔助參考</text>

  <!-- Arrows -->
  <path d="M 340 215 C 375 215, 390 235, 430 250" class="arrow"/>
  <path d="M 340 392 C 375 392, 392 368, 430 350" class="arrow"/>
  <path d="M 730 298 L 820 298" class="arrow"/>
  <path d="M 985 455 C 985 492, 985 505, 985 535" class="arrow"/>
  <path d="M 820 665 L 730 650" class="arrow"/>
  <path d="M 730 630 L 820 630" class="arrow"/>
  <path d="M 820 705 C 650 805, 420 805, 340 735" class="arrow"/>
  <path d="M 1150 668 L 1190 668" class="arrow"/>
  <path d="M 210 800 C 210 838, 360 852, 520 865" class="dash"/>
  <path d="M 1265 800 C 1265 845, 1080 855, 900 865" class="dash"/>

  <!-- Labels -->
  <text x="756" y="283" class="small">整理後資料</text>
  <text x="1010" y="505" class="small">建立 X</text>
  <text x="745" y="626" class="small">建立 y</text>
  <text x="1160" y="650" class="small">預測結果</text>
</svg>
